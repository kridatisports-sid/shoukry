
<!DOCTYPE html>
<html>
<head>
<title>Player Registration</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:30px}
form{max-width:700px;margin:auto;background:#1e293b;padding:30px;border-radius:10px}
input,select{width:100%;padding:12px;margin-bottom:15px}
button{padding:12px 20px;background:#f59e0b;border:none;font-weight:bold}
</style>
</head>
<body>

<h1>Player Registration</h1>

<form action="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec" method="POST" enctype="multipart/form-data">

<input type="text" name="player_name" placeholder="Player Name" required>
<input type="date" name="dob" required>
<input type="text" name="club_name" placeholder="Club Name" required>
<input type="text" name="parent_name" placeholder="Parent Name" required>
<input type="text" name="aadhaar_number" placeholder="Aadhaar Number" required>

<label>Aadhaar Upload</label>
<input type="file" name="aadhaar_file">

<label>Birth Certificate</label>
<input type="file" name="birth_certificate">

<button type="submit">Submit Player</button>

</form>

</body>
</html>
