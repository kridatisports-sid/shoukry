
<!DOCTYPE html>
<html>
<head>
<title>Match Report</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:30px}
form{max-width:700px;margin:auto;background:#1e293b;padding:30px;border-radius:10px}
input{width:100%;padding:12px;margin-bottom:15px}
button{padding:12px 20px;background:#f59e0b;border:none;font-weight:bold}
</style>
</head>
<body>

<h1>Match Report</h1>

<form action="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec" method="POST">

<input type="text" name="team_a" placeholder="Team A">
<input type="text" name="team_b" placeholder="Team B">
<input type="number" name="score_a" placeholder="Team A Score">
<input type="number" name="score_b" placeholder="Team B Score">
<input type="text" name="goal_scorers" placeholder="Goal Scorers">

<button type="submit">Submit Match</button>

</form>

</body>
</html>
